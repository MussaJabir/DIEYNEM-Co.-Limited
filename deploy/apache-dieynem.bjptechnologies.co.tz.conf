# DIEYNEM — Apache reverse-proxy vhost (coexists with the existing PHP sites).
#
# Install:
#   sudo cp deploy/apache-dieynem.bjptechnologies.co.tz.conf \
#           /etc/apache2/sites-available/dieynem.bjptechnologies.co.tz.conf
#   sudo a2enmod proxy proxy_http headers
#   sudo a2ensite dieynem.bjptechnologies.co.tz
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d dieynem.bjptechnologies.co.tz
#
# certbot copies this into a matching *-le-ssl.conf (port 443) and adds an
# HTTP->HTTPS redirect here, exactly like the other bjptechnologies sites.

<VirtualHost *:80>
    ServerName dieynem.bjptechnologies.co.tz

    # Pairs with SECURE_PROXY_SSL_HEADER in config/settings/prod.py so Django
    # knows the original request was HTTPS. Harmless on :80 because certbot
    # adds a redirect to :443 before anything is proxied; the SSL vhost it
    # generates inherits this header.
    RequestHeader set X-Forwarded-Proto "https"

    # Serve static & uploaded files straight from disk — keeps them off the
    # (memory-limited) Gunicorn workers.
    Alias /static/ /var/www/dieynem.bjptechnologies.co.tz/staticfiles/
    Alias /media/  /var/www/dieynem.bjptechnologies.co.tz/media/
    <Directory /var/www/dieynem.bjptechnologies.co.tz/staticfiles/>
        Require all granted
    </Directory>
    <Directory /var/www/dieynem.bjptechnologies.co.tz/media/>
        Require all granted
    </Directory>

    # Everything else -> Gunicorn over a local unix socket (no extra open port).
    ProxyPreserveHost On
    ProxyPass /static/ !
    ProxyPass /media/  !
    ProxyPass        / unix:/run/dieynem/gunicorn.sock|http://localhost/
    ProxyPassReverse / unix:/run/dieynem/gunicorn.sock|http://localhost/

    ErrorLog  ${APACHE_LOG_DIR}/dieynem-error.log
    CustomLog ${APACHE_LOG_DIR}/dieynem-access.log combined
</VirtualHost>
