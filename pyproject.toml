[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
    migrations
  | venv
  | static
  | node_modules
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["migrations", "venv", "static", "node_modules"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]
ignore = ["E501"]  # line length handled by black

[tool.ruff.lint.per-file-ignores]
"*/settings/*.py" = ["F403", "F405"]
"config/settings/*.py" = ["F403", "F405"]
