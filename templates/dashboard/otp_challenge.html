{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify it's you &middot; DIEYNEM Admin</title>
  <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
  <link rel="stylesheet" href="{% static 'css/tailwind.out.css' %}">
</head>
<body class="font-sans bg-navy-950 antialiased min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <span class="font-heading text-white text-2xl font-extrabold">DIEYNEM<span class="text-amber-500">.</span></span>
      <p class="text-navy-300 text-sm mt-1">Admin Dashboard</p>
    </div>
    <div class="bg-white rounded-xl shadow-lg p-6">
      <h1 class="font-heading text-lg font-bold text-navy-800 mb-1">Two-step verification</h1>
      <p class="text-sm text-slate-500 mb-4">Enter the 6-digit code from your authenticator app — or a backup code.</p>
      {% if messages %}{% for message in messages %}
      <p class="text-sm text-danger bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-3">{{ message }}</p>
      {% endfor %}{% endif %}
      <form method="post" action="{% url 'dashboard:otp_challenge' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <label for="id_otp_token" class="block text-sm font-medium text-slate-700 mb-1">Verification code</label>
        <input id="id_otp_token" name="otp_token" type="text" inputmode="numeric" autocomplete="one-time-code"
               autofocus required pattern="[0-9A-Za-z]*"
               class="w-full rounded-lg border border-slate-300 px-3 py-2 tracking-widest text-center text-lg focus:outline-none focus:ring-2 focus:ring-amber-400">
        <button type="submit" class="w-full mt-4 bg-navy-600 text-white font-semibold py-2.5 rounded-lg hover:bg-navy-700 transition-colors">Verify</button>
      </form>
    </div>
    <form method="post" action="{% url 'logout' %}" class="text-center mt-4">{% csrf_token %}
      <button type="submit" class="text-navy-400 text-xs hover:text-navy-200 transition-colors">Sign out</button>
    </form>
  </div>
</body>
</html>
