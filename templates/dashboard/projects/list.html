{% extends "dashboard/base.html" %}

{% block title %}Projects &middot; DIEYNEM Admin{% endblock %}
{% block heading %}Projects{% endblock %}

{% block dashboard_content %}
<div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-4">
  <form method="get" hx-get="{{ request.path }}" hx-target="#results" hx-push-url="true"
        hx-trigger="submit, change, input changed delay:300ms" hx-indicator="#list-spin"
        class="flex flex-wrap items-center gap-2">
    <div class="relative">
      <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
      </svg>
      <input type="search" name="q" value="{{ q }}" placeholder="Search projects…" autocomplete="off"
             class="w-full sm:w-60 rounded-lg border border-slate-300 pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
    </div>
    <select name="status" class="rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-400">
      <option value="">All statuses</option>
      {% for value, label in statuses %}<option value="{{ value }}" {% if active_status == value %}selected{% endif %}>{{ label }}</option>{% endfor %}
    </select>
    <select name="sector" class="rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-400">
      <option value="">All sectors</option>
      {% for value, label in sectors %}<option value="{{ value }}" {% if active_sector == value %}selected{% endif %}>{{ label }}</option>{% endfor %}
    </select>
    <select name="published" class="rounded-lg border border-slate-300 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-400">
      <option value="">Any state</option>
      <option value="published" {% if active_published == 'published' %}selected{% endif %}>Published</option>
      <option value="draft" {% if active_published == 'draft' %}selected{% endif %}>Draft</option>
    </select>
    <noscript><button type="submit" class="rounded-lg bg-slate-100 px-3 py-2 text-sm font-semibold text-slate-700">Filter</button></noscript>
    <span id="list-spin" class="htmx-indicator text-xs text-slate-400">Filtering…</span>
  </form>
  <a href="{% url 'dashboard:project_create' %}" class="shrink-0 bg-navy-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-navy-700 transition-colors">+ New project</a>
</div>

<div id="results">
  {% include "dashboard/projects/_table.html" %}
</div>
{% endblock %}
