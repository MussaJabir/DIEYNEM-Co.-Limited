{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in &middot; DIEYNEM Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/tailwind.out.css' %}">
</head>
<body class="font-sans bg-navy-950 antialiased min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <span class="font-heading text-white text-2xl font-extrabold">DIEYNEM<span class="text-amber-500">.</span></span>
      <p class="text-navy-300 text-sm mt-1">Admin Dashboard</p>
    </div>
    <div class="bg-white rounded-xl shadow-lg p-6">
      <h1 class="font-heading text-lg font-bold text-navy-800 mb-4">Sign in</h1>
      {% if form.errors %}
      <p class="text-sm text-danger bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-3">
        Invalid username or password. Please try again.
      </p>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="space-y-3">
          <div>
            <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
            <input id="id_username" name="username" type="text" autofocus required
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
          </div>
          <div>
            <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input id="id_password" name="password" type="password" required
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit"
                  class="w-full bg-navy-600 text-white font-semibold py-2.5 rounded-lg hover:bg-navy-700">
            Sign in
          </button>
        </div>
      </form>
    </div>
    <p class="text-center text-navy-400 text-xs mt-6">&copy; {% now "Y" %} DIEYNEM Co. Limited</p>
  </div>
</body>
</html>
