{% comment %}Picks an SVG icon for a service by a keyword in its name. Expects: service.{% endcomment %}
<svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor" aria-hidden="true">
{% if "Electrical" in service.name or "Power Distribution" in service.name %}

{% elif "ICT" in service.name or "Cabling" in service.name %}

{% elif "Fire" in service.name or "Alarm" in service.name %}

{% elif "Air Conditioning" in service.name or "HVAC" in service.name or "Ventilation" in service.name %}

{% elif "Solar" in service.name %}
  <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>

  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/>
{% else %}
  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
{% endif %}
</svg>
